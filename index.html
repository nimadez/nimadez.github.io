<script type="x-shader/x-vertex" id="vs_points">
    precision highp float;

    attribute vec3 position;
    attribute vec4 color;
    uniform mat4 worldViewProjection;
    varying vec4 vColor;
    varying float vSize;

    void main() {
        gl_Position = worldViewProjection * vec4(position, 1.0);
        gl_PointSize = 1.0 + (-position.z / 4.0) * 0.02;
        vColor = color;
        vSize = gl_PointSize;
    }
</script>
<script type="x-shader/x-fragment" id="fs_points">
    precision mediump float;

    varying vec4 vColor;
    varying float vSize;
    uniform float uTime;

    void main() {
        float alpha = 0.5;
        if (vSize > 1.9)
            alpha = sin(uTime/6000.0);
        if (vSize < 1.5)
            alpha = sin(uTime/3000.0);
        vec4 color = vColor;
        color.a = alpha;
        gl_FragColor = color;
    }

    hexosphere.material.opacityTexture.vScale = 100;
    hexosphere.material.disableLighting = true;
    hexosphere.material.backFaceCulling = true;
    hexosphere.material.freeze();
    hexosphere.visibility = 0.05;
    hexosphere.infiniteDistance = true;
    hexosphere.ignoreCameraMaxZ = true;
    hexosphere.doNotSyncBoundingInfo = true;
    hexosphere.convertToUnIndexedMesh();
    hexosphere.freezeWorldMatrix();
    hexosphere.freezeNormals();
    
    const core = BABYLON.MeshBuilder.CreateSphere("core", { diameter: 0.4, segments: 3 }, scene);
    core.isPickable = true;
    core.renderOverlay = true;
    core.overlayAlpha = 1;
    core.overlayColor = new BABYLON.Color3(1, 1, 0.5);
    core.rotationQuaternion = new BABYLON.Quaternion();
    core.convertToUnIndexedMesh();
    core.freezeNormals();
    hl.addMesh(core, new BABYLON.Color3(1, 1, 0));
    const coreEuler = core.rotationQuaternion.toEulerAngles();

    const ghostSphere = BABYLON.CreateSphere("ghostsphere", { diameter: 2.5, segments: 8 }, scene);
    ghostSphere.isVisible = false;
    ghostSphere.isPickable = false;
    ghostSphere.doNotSyncBoundingInfo = true;
    ghostSphere.convertToUnIndexedMesh();
    ghostSphere.freezeWorldMatrix();
    ghostSphere.freezeNormals();
    
    const player = new Player();
    const enemies = new Enemies();
    const nanobots = new Nanobots();
    const lightPath = createLightPaths();
    let pcs = createPointCloud(canvas.width, 200);
    createParticlesGPU();
    createGate();

    function Player() {
        const velocity = 10;
        const frict = 0.98;
        const dv = 0.35;
        const dt = 0.85;
        this.isMove = false;
        this.isAccelerate = false;
        this.x = canvas.width/2;
        this.y = canvas.height/2;
        this.angle = 0;
        this.vector = { x: 0, y: 0 };
        this.node = new BABYLON.TransformNode('player');
        this.mesh = null;
        this.exhust = null;
        this.wings = [];
        this.hitCount = 0;

        this.init = function() {
            this.mesh = BABYLON.CreateCylinder("mesh", { diameterBottom: 1.5, diameterTop: 0, tessellation: 6, subdivisions: 1, hasRings: true }, scene);
            this.mesh.scaling.scaleInPlace(-0.2);
            this.mesh.rotation.x = PIH;
            this.mesh.rotation.y = -Math.PI;
            this.mesh.rotation.z = PI2;
            this.mesh.visibility = 1;
            this.mesh.edgesWidth = 2;
            this.mesh.edgesColor = new BABYLON.Color4(0, 1, 1, 0.8);
            this.mesh.material = new BABYLON.StandardMaterial("player", scene);
            this.mesh.material.diffuseColor = new BABYLON.Color3(1, 1, 1);
            this.mesh.material.specularColor = new BABYLON.Color3(0.5, 0.5, 0);
            this.mesh.material.backFaceCulling = true;
            this.mesh.material.freeze();
            this.mesh.parent = this.node;
            this.mesh.doNotSyncBoundingInfo = true;
            this.mesh.convertToUnIndexedMesh();
            this.mesh.enableEdgesRendering();
            this.mesh.freezeNormals();
            this.exhust = BABYLON.CreateCylinder("exhust", { diameter: 0.2 }, scene);
            this.exhust.visibility = 0.01;
            this.exhust.scaling.y = 0.01;
            this.exhust.position.z = -0.23;
            this.exhust.rotation.x = PIH;
            this.exhust.edgesWidth = 2;
            this.exhust.edgesColor = new BABYLON.Color4(1, 1, 0, 1); // a overrided
            this.exhust.parent = this.node;
            this.exhust.doNotSyncBoundingInfo = true;
            this.exhust.convertToUnIndexedMesh();
            this.exhust.enableEdgesRendering();
            this.exhust.freezeNormals();
            this.wings[0] = BABYLON.MeshBuilder.CreateBox('wingL', { size: 0.05 });
            this.wings[0].scaling.z = 3;
            this.wings[0].position.x = -0.25;
            this.wings[0].position.z = -0.15;
            this.wings[0].edgesWidth = 1;
            this.wings[0].edgesColor = new BABYLON.Color4(1, 1, 0, 0); // a overrided
            this.wings[0].parent = this.node;
            this.wings[0].doNotSyncBoundingInfo = true;
            this.wings[0].convertToUnIndexedMesh();
            this.wings[0].enableEdgesRendering();
            this.wings[0].freezeNormals();
            this.wings[1] = this.wings[0].clone('wingR');
            this.wings[1].position.x = 0.25;
            this.wings[1].edgesWidth = 1;
            this.wings[1].edgesColor = new BABYLON.Color4(1, 1, 0, 0); // a overrided
            this.wings[1].parent = this.node;
            this.wings[1].doNotSyncBoundingInfo = true;
            this.wings[1].convertToUnIndexedMesh();
            this.wings[1].enableEdgesRendering();
            this.wings[1].freezeNormals();
        }

        this.update = function() {
            this.vector.x *= frict;
            this.vector.y *= frict;
            this.x += this.vector.x * dt;
            this.y += this.vector.y * dt;

            this.node.position = unproject(this.x, this.y).scale(0.001);
            this.node.position.y += 1.73; // camera position matching
            this.node.position.z = 3;
            this.node.lookAt(BABYLON.Vector3.Zero());

            this.controls();
            this.collision();
        }

        this.controls = function() {
            if (this.isMove) {
                if (this.isAccelerate) {
                    this.angle = Math.atan2(scene.pointerX - this.x, -(scene.pointerY - this.y));
                    this.vector.x += dv * Math.cos(this.angle - PIH);
                    this.vector.y += dv * Math.sin(this.angle - PIH);
                    if (this.vector.x > velocity)  this.vector.x = velocity;
                    if (this.vector.y < -velocity) this.vector.y = -velocity;
                    if (this.vector.x < -velocity) this.vector.x = -velocity;
                    if (this.vector.y > velocity)  this.vector.y = velocity;
                    this.exhust.edgesColor.a = Math.random();
                }
            } else {
                this.isAccelerate = false;
                this.exhust.edgesColor.a = 0;
            }
        }

        this.collision = function() {
            const pos = project(player.node.position);
            if (pos.x >= canvas.width  || pos.x <= 0) this.vector.x *= -1;
            if (pos.y >= canvas.height || pos.y <= 0) this.vector.y *= -1;
            if (pos.x >  canvas.width)  this.x = lerp(this.x, canvas.width, 0.01);
            if (pos.y >  canvas.height) this.y = lerp(this.y, canvas.height, 0.01);
            if (pos.x < 0) this.x = lerp(this.x, 0, 0.01);
            if (pos.y < 0) this.y = lerp(this.y, 0, 0.01);
        }

        const laserColor = new BABYLON.Color4(1, 1, 0, 0.8);
        let laser = BABYLON.MeshBuilder.CreateLines("lines", {
            points: [ BABYLON.Vector3.Zero(), BABYLON.Vector3.Zero() ],
            colors: [ laserColor, laserColor ],
            updatable: true
        }, scene);
        laser.isVisible = false;

        this.fire = function(pick) {
            laser = BABYLON.MeshBuilder.CreateLines("lines", {
                points: [ BABYLON.Vector3.Zero(), pick.pickedPoint ],
                colors: [ laserColor, laserColor ],
                instance: laser,
            }, scene);
            laser.isVisible = true;
            this.wings[0].edgesColor.a = Math.random();
            this.wings[1].edgesColor.a = Math.random();
            setTimeout(() => {
                laser.isVisible = false;
                this.wings[0].edgesColor.a = 0;
                this.wings[1].edgesColor.a = 0;
            }, 20);
            
            //pick.pickedMesh.renderOverlay = true;
            /* setTimeout(() => {
                if (enemies.group.indexOf(pick.pickedMesh) > -1) {
                    pick.pickedMesh.dispose();
                    enemies.group.splice(enemies.group.indexOf(pick.pickedMesh), 1);
                    player.hitCount++;
                }
            }, 500); */
        }

        this.init();
    }

    function Enemies() {
        this.enemy = null;
        this.group = [];
        this.node = new BABYLON.TransformNode('enemies');

        this.init = function() {
            this.enemy = BABYLON.CreateBox("enemy", { size: 0.2 }, scene);
            this.enemy.isVisible = false;
        }

        this.update = function() {
            setTimeout(() => {
                if (this.group.length < 3) {
                    const c = this.enemy.clone();
                    c.isVisible = true;
                    c.position.x = 20 * Math.random() - 10;
                    c.position.y = 20 * Math.random() - 10;
                    c.position.z = 20;
                    c.parent = this.node;
                    this.group.push(c);
                }
            }, 1000);
            
            for (let i = 0; i < this.group.length; i++) {
                this.group[i].position = BABYLON.Vector3.Lerp(
                    this.group[i].position, BABYLON.Vector3.Zero(),
                    0.002
                );

                if (BABYLON.Ray.CreateNewFromTo(
                    player.node.position, this.group[i].position).length < 5) {
                        this.group[i].position = BABYLON.Vector3.Lerp(
                            this.group[i].position, player.node.position,
                            0.1
                        );
                }

                if (this.group[i].intersectsMesh(ghostSphere, false)) {
                    this.group[i].renderOverlay = true;
                    this.group[i].overlayColor.r = 1;
                    this.group[i].overlayColor.g = 1;
                    this.group[i].overlayColor.b = 0;
                }

                if (this.group[i].intersectsMesh(core, false)) {
                    this.group[i].dispose();
                    this.group.splice(this.group.indexOf(this.group[i]), 1);
                }
            }
        }

        this.init();
    }

    function Nanobots() {
        this.nanobot = null;
        this.goldberg = null;
        this.bots = [];
        this.trails = [];
        this.points = [];
        this.isActive = false;

        this.init = function() {
            this.goldberg = BABYLON.MeshBuilder.CreateGoldberg("goldberg", { m: 1, n: 1, size: 0.4 }, scene);
            this.goldberg.visibility = 0.01;
            this.goldberg.edgesWidth = 2;
            this.goldberg.edgesColor = new BABYLON.Color4(1, 1, 0.5, 0.6);
            this.goldberg.parent = core;
            this.goldberg.convertToUnIndexedMesh();
            this.goldberg.enableEdgesRendering();
            this.goldberg.freezeNormals();

            this.nanobot = BABYLON.CreateSphere("nanobot", { diameter: 0.4, segments: 1 }, scene);
            this.nanobot.isVisible = false;
            this.nanobot.isPickable = false;
            this.nanobot.renderOverlay = true;
            this.nanobot.overlayAlpha = 1;
            this.nanobot.overlayColor = new BABYLON.Color3(1, 1, 1);
            this.nanobot.parent = core;
            this.nanobot.doNotSyncBoundingInfo = true;
            this.nanobot.convertToUnIndexedMesh();
            this.nanobot.freezeNormals();

            const points = [ new BABYLON.Vector3(0.5, 0, 0), new BABYLON.Vector3(0, 0, 0), new BABYLON.Vector3(-0.5, 0, 0) ];
            const colors = [ new BABYLON.Color4(0, 1, 1, 0.5), new BABYLON.Color4(1, 1, 0, 1), new BABYLON.Color4(1, 0, 1, 0.5) ];
            const pole = BABYLON.MeshBuilder.CreateLines("pole", { points: points, colors: colors, updatable: false });
            pole.parent = core;

            for (let i = 0; i < 20; i++) {
                this.bots[i] = this.nanobot.createInstance("nanobot_"+i);
                this.bots[i].scaling.setAll(0.15);
                this.bots[i].parent = core;
                this.bots[i].edgesWidth = 1;
                if (i % 2 == 0) {
                    this.bots[i].edgesColor = new BABYLON.Color4(1, 0, 1, randomRange(0.2, 0.6));
                } else {
                    this.bots[i].edgesColor = new BABYLON.Color4(0, 1, 1, randomRange(0.2, 0.6));
                }
                this.bots[i].enableEdgesRendering();
                this.goldberg.placeOnGoldbergFaceAt(this.bots[i], i, this.goldberg.position.add(new BABYLON.Vector3(0,0,0)));
                this.updatePoint(i, this.bots[i].position);

                this.trails[i] = new BABYLON.TrailMesh('trail_'+i, this.bots[i], utilLayer.utilityLayerScene, 0.15, 150, true);
                this.trails[i].visibility = randomRange(0.02, 0.04);
                this.trails[i].renderOverlay = true;
                this.trails[i].overlayAlpha = 0.3;
                if (i % 2 == 0) {
                    this.trails[i].overlayColor = new BABYLON.Color3(1, 0.5, 1);
                } else {
                    this.trails[i].overlayColor = new BABYLON.Color3(0.5, 1, 1);
                }
                this.trails[i].isVisible = false;
                this.trails[i].isPickable = false;
                this.trails[i].doNotSyncBoundingInfo = true;
            }
            
            setTimeout(() => {
                this.updatePoints();
                setTimeout(() => {
                    for (let i = 0; i < this.bots.length; i++)
                        this.trails[i].isVisible = true;
                }, 2000);
            }, 1000);
        }

        this.updatePoints = function() {
            for (let i = 0; i < this.bots.length; i++)
                this.updatePoint(i, randomSpherePoint(RADIUS));
        }

        this.updatePoint = function(index, point) {
            this.points[index] = point;
        }

        this.update = function() {
            for (let i = 0; i < this.bots.length; i++) {
                this.bots[i].position = BABYLON.Vector3.Lerp(
                    this.bots[i].position, this.points[i], 0.01);
            }
        }

        this.init();
    }

    function createGate() {
        const tri = [ 
            new BABYLON.Vector3(-10,2,0),
            new BABYLON.Vector3(-1,10,0),
            new BABYLON.Vector3(0,100,0),
            new BABYLON.Vector3(1,10,0),
            new BABYLON.Vector3(10,2,0)
        ];
        const line = BABYLON.MeshBuilder.CreateLines("tube", { points: tri, updatable: false }, scene);
        line.color = new BABYLON.Color3(0,1,1);
        line.alpha = 0.06;
        line.position.y = -2;
        line.position.z = -200;
        const line2 = line.createInstance();
        line2.position.z += 50;
        const line3 = line.createInstance();
        line3.position.z += 100;
        const line4 = line.createInstance();
        line4.position.z += 150;
    }

    function createLightPaths() {
        const mat = new BABYLON.StandardMaterial("unlit", scene);
        mat.diffuseColor = new BABYLON.Color3(1,1,1);
        mat.specularColor = new BABYLON.Color3(0,0,0);
        mat.disableLighting = true;
        mat.backFaceCulling = true;
        mat.freeze();
        const lp = BABYLON.CreateBox("lightpath", { size: 0.012 }, scene);
        lp.material = mat;
        lp.renderOverlay = true;
        lp.overlayAlpha = 1;
        lp.overlayColor = new BABYLON.Color3(1, 1, 0);
        lp.scaling.y = 2;
        lp.scaling.z = 100;
        lp.position.x = 0.01; // overlap
        lp.position.z = 30;
        lp.convertToUnIndexedMesh();
        lp.freezeNormals();
        const lp1 = lp.createInstance();
        lp1.setParent(lp);
        lp1.position.x -= 5;
        lp1.position.z += 0.2;
        const lp2 = lp.createInstance();
        lp2.setParent(lp);
        lp2.position.x += 5;
        lp2.position.z += 0.2;
        return lp;
    }

    function createPointCloud(num, rad) {
        const shaderMaterial = new BABYLON.ShaderMaterial("pcspoints", scene, {
                vertexElement: "vs_points",
                fragmentElement: "fs_points",
            }, {
                attributes: ["position", "normal", "color"],
                uniforms:   ["world", "worldView", "worldViewProjection", "view", "projection",
                             "uTime"],
                needAlphaBlending: true,
                needAlphaTesting: false
            }
        );
        const pcs = new BABYLON.PointsCloudSystem("pcs", 1, scene, { updatable: false });
        const pcsFunc = (p, i, s) => {
            p.position.x = (Math.random() * 2 - 1) * rad;
            p.position.y = (Math.random() * 2 - 1) * rad;
            p.position.z = (Math.random() * 2 - 1) * rad;
            p.color = new BABYLON.Color4(1.0, 0.7, 1.0, 0.8);
        };
        pcs.addPoints(num, pcsFunc);
        pcs.buildMeshAsync().then(() => {
            pcs.initParticles();
            pcs.setParticles();
            pcs.mesh.material = shaderMaterial;
            pcs.mesh.material.pointsCloud = true;
            pcs.mesh.freezeNormals();
        });
        return pcs;
    }

    function createParticlesGPU(num) {
        const emitter = new BABYLON.SphereParticleEmitter();
        emitter.radius = 5;
        emitter.radiusRange = 0;
        const p = new BABYLON.GPUParticleSystem("particles", { capacity: 500 }, scene);
        p.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
        p.particleTexture = new BABYLON.Texture(PARTICLE, scene);
        p.addColorGradient(0, new BABYLON.Color4(0, 1, 1, 0.6));
        p.addColorGradient(1, new BABYLON.Color4(1, 0, 1, 0.6));
        p.particleEmitterType = emitter;
        p.emitter = new BABYLON.Vector3(0, 0, -10);
        p.gravity = new BABYLON.Vector3(0, 0, 1);
        p.isBillboardBased = false;
        p.preWarmStepOffset = 1;
        p.preWarmCycles = 1;
        p.minInitialRotation = -PI2;
        p.maxInitialRotation = PI2;
        p.minSize = 0.01;
        p.maxSize = 0.03;
        p.minLifeTime = 6.0;
        p.maxLifeTime = 9.0;
        p.emitRate = 50;
        p.minAngularSpeed = -0.4;
        p.maxAngularSpeed = 0.4;
        p.minEmitPower = 0.5;
        p.maxEmitPower = 1;
        p.updateSpeed = 0.005;
        p.start();

        const c = new BABYLON.GPUParticleSystem("clouds", { capacity: 500 }, scene);
        c.activeParticleCount = 500;
        c.manualEmitCount = c.activeParticleCount;
        c.minEmitBox = new BABYLON.Vector3(-200, -5, -200);
        c.maxEmitBox = new BABYLON.Vector3(200, 50, 200);
        c.particleTexture = new BABYLON.Texture(CLOUD, scene);
        c.emitter = grid;
        c.color1 = new BABYLON.Color4(0, 0.8, 0.8, 0.02);
        c.color2 = new BABYLON.Color4(0.8, 0, 0.8, 0.02);
        c.minSize = 30.0;
        c.maxSize = 50.0;
        c.minLifeTime = Number.MAX_SAFE_INTEGER;
        c.emitRate = 50000;
        c.blendMode = BABYLON.ParticleSystem.BLENDMODE_STANDARD;
        c.gravity = new BABYLON.Vector3(0, 0, 0);
        c.direction1 = new BABYLON.Vector3(0, 0, 0);
        c.direction2 = new BABYLON.Vector3(0, 0, 0);
        c.minAngularSpeed = -2;
        c.maxAngularSpeed = 2;
        c.minEmitPower = 0.5;
        c.maxEmitPower = 1;
        c.updateSpeed = 0.005;
        c.start();
    }

    scene.executeOnceBeforeRender(() => {
        //
    }, 100);

    scene.executeWhenReady(() => {
        //
    }, 100);

    scene.registerBeforeRender(() => {
        pcs.mesh.material.setFloat("uTime", performance.now());
        pcs.mesh.rotation.z += 0.0002;
        lightPath.position.z -= 1;
        if (lightPath.position.z < -1000)
            lightPath.position.z = 30;
    });

    scene.registerAfterRender(() => {
        coreEuler.x -= player.vector.y * 0.003;
        coreEuler.y -= player.vector.x * 0.003;
        coreEuler.z -= 0.003;
        BABYLON.Quaternion.FromEulerVectorToRef(coreEuler, core.rotationQuaternion);

        player.update();
        if (isGameStart)
            enemies.update();
        nanobots.update();
    });

    const predicate = function(mesh) {
        return enemies.group.includes(mesh);
    };

    scene.onPointerObservable.add((pInfo) => {
        let pick = null;
        switch (pInfo.type) {
            case BABYLON.PointerEventTypes.POINTERDOWN:
                player.isMove = true;
                player.isAccelerate = true;
                pick = scene.pick(scene.pointerX, scene.pointerY, predicate);
                if (pick.hit)
                    player.fire(pick);
                break;
            case BABYLON.PointerEventTypes.POINTERUP:
                player.isMove = false;
                break;
            case BABYLON.PointerEventTypes.POINTERMOVE:
                pick = scene.pick(scene.pointerX, scene.pointerY, predicate);
                if (pick.hit && player.isMove)
                    player.fire(pick);
                break;
        }
    });

    canvas.addEventListener('contextmenu', (ev) => {
        ev.preventDefault();
    }, false);

    window.addEventListener("resize", (ev) => {
        engine.resize();

        if (window.innerHeight > window.innerWidth) {
            camera.fovMode = BABYLON.Camera.FOVMODE_VERTICAL_FIXED;
        } else {
            camera.fovMode = BABYLON.Camera.FOVMODE_HORIZONTAL_FIXED;
        }

        player.x = canvas.width/2;
        player.y = canvas.height/2;

        pcs.dispose();
        pcs = createPointCloud(canvas.width, 200);
    }, false);

    function randomSpherePoint(rad) {
        const theta = PI2 * Math.random();
        const phi = Math.acos(2 * Math.random() - 1);
        return new BABYLON.Vector3(
            rad * Math.sin(phi) * Math.cos(theta), 
            rad * Math.sin(phi) * Math.sin(theta), 
            rad * Math.cos(phi));
    }

    function project(vec3) {
        return BABYLON.Vector3.Project(
            vec3,
            BABYLON.Matrix.IdentityReadOnly,
            scene.getTransformMatrix(),
            camera.viewport.toGlobal(
                engine.getRenderWidth(), engine.getRenderHeight()
            )
        );
    }

    function unproject(x, y) {
        return BABYLON.Vector3.Unproject(
            new BABYLON.Vector3(x, y, 1),
            engine.getRenderWidth(), engine.getRenderHeight(),
            BABYLON.Matrix.Identity(),
            scene.getViewMatrix(), scene.getProjectionMatrix()
        );
    }

    function randomRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    function lerp(val1, val2, num) {
        num = num < 0 ? 0 : num;
        num = num > 1 ? 1 : num;
        return val1 + (val2 - val1) * num;
    }

    function degToRad(deg) {
        return (deg * Math.PI) / 180;
    }
</script>
